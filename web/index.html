<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Pup Dash - Multiplayer Endless Runner">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Pup Dash">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Pup Dash</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Request DeviceMotion permission (required on iOS Safari)
    async function requestMotionPermission() {
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        try {
          const result = await DeviceMotionEvent.requestPermission();
          return result === 'granted';
        } catch (e) {
          console.error('Motion permission error:', e);
          return false;
        }
      }
      // Android/desktop: no permission needed, assume available
      return true;
    }

    // Check if sensors are available at all
    function checkSensorAvailable() {
      return 'DeviceMotionEvent' in window || 'DeviceOrientationEvent' in window;
    }

    // Screen Wake Lock: prevent the phone from dimming/locking while playing
    let _wakeLock = null;
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          _wakeLock = await navigator.wakeLock.request('screen');
          _wakeLock.addEventListener('release', () => { _wakeLock = null; });
          // If the page becomes visible again after being hidden, re-acquire
          document.addEventListener('visibilitychange', async () => {
            if (_wakeLock === null && document.visibilityState === 'visible') {
              try {
                _wakeLock = await navigator.wakeLock.request('screen');
              } catch (_) {}
            }
          });
          return true;
        }
      } catch (e) {
        console.error('Wake lock error:', e);
      }
      return false;
    }

    async function releaseWakeLock() {
      try {
        if (_wakeLock !== null) {
          await _wakeLock.release();
          _wakeLock = null;
        }
      } catch (_) {}
    }

    // Background music — synthesized via Web Audio API so no audio file is
    // shipped in the bundle. A bouncy C-major loop designed to feel playful
    // for young kids.
    let _musicCtx = null;
    let _musicGain = null;
    let _musicTimer = null;
    function startBackgroundMusic() {
      if (_musicCtx) return;
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        _musicCtx = new AudioCtx();
        _musicGain = _musicCtx.createGain();
        _musicGain.gain.value = 0.12;
        _musicGain.connect(_musicCtx.destination);

        // Melody: bouncy repeating phrase in C major.
        // Each entry: [frequency Hz, duration seconds]. freq = 0 means rest.
        const melody = [
          [523, 0.18], [659, 0.18], [784, 0.18], [659, 0.18],
          [523, 0.18], [659, 0.18], [784, 0.36],
          [698, 0.18], [784, 0.18], [880, 0.36],
          [784, 0.18], [659, 0.18], [523, 0.36],
          [0, 0.3]
        ];
        // Simple bass line (one note per beat group)
        const bass = [
          [131, 0.72], // C3
          [131, 0.72],
          [174, 0.72], // F3
          [131, 0.72],
          [0, 0.3]
        ];

        function playNote(time, freq, dur, type, targetGain) {
          if (freq <= 0) return;
          const osc = _musicCtx.createOscillator();
          const g = _musicCtx.createGain();
          osc.type = type;
          osc.frequency.value = freq;
          g.gain.setValueAtTime(0, time);
          g.gain.linearRampToValueAtTime(targetGain, time + 0.02);
          g.gain.linearRampToValueAtTime(0, time + dur * 0.95);
          osc.connect(g);
          g.connect(_musicGain);
          osc.start(time);
          osc.stop(time + dur);
        }

        function loop() {
          if (!_musicCtx) return;
          let t = _musicCtx.currentTime + 0.05;
          const phraseStart = t;
          for (const [f, d] of melody) {
            playNote(t, f, d, 'triangle', 1.0);
            t += d;
          }
          const phraseEnd = t;
          // Bass runs alongside melody
          let b = phraseStart;
          for (const [f, d] of bass) {
            playNote(b, f, d, 'sine', 0.8);
            b += d;
          }
          const aheadMs = Math.max(0, (phraseEnd - _musicCtx.currentTime) * 1000 - 50);
          _musicTimer = setTimeout(loop, aheadMs);
        }
        loop();
      } catch (e) {
        console.error('Music error:', e);
      }
    }
    function stopBackgroundMusic() {
      if (_musicTimer) { clearTimeout(_musicTimer); _musicTimer = null; }
      if (_musicCtx) {
        try { _musicCtx.close(); } catch (_) {}
        _musicCtx = null;
        _musicGain = null;
      }
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
