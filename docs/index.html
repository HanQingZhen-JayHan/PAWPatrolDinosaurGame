<!DOCTYPE html>
<html>
<head>
  <base href="/PAWPatrolDinosaurGame/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Pup Dash - Multiplayer Endless Runner">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Pup Dash">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Pup Dash</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Request DeviceMotion permission (required on iOS Safari).
    // Must be called inside a user-gesture handler — we keep the call
    // path as short as possible so the gesture isn't lost across awaits.
    async function requestMotionPermission() {
      const hasReq = typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function';
      if (!hasReq) {
        console.log('[motion] requestPermission not exposed — assuming granted');
        return true;
      }
      try {
        // Call synchronously here; the first await below is the prompt itself.
        const result = await DeviceMotionEvent.requestPermission();
        console.log('[motion] DeviceMotionEvent.requestPermission result:', result);
        return result === 'granted';
      } catch (e) {
        console.error('[motion] permission error:', e);
        return false;
      }
    }

    // True when running inside Chrome / Firefox / Edge on iOS (WKWebView).
    // Those browsers don't expose DeviceMotionEvent.requestPermission and
    // typically can't access motion sensors at all — Safari is required.
    function isIOSNonSafari() {
      const ua = navigator.userAgent;
      const isIOS = /iPad|iPhone|iPod/.test(ua) ||
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      if (!isIOS) return false;
      // Chrome iOS = CriOS, Firefox = FxiOS, Edge = EdgiOS
      return /CriOS|FxiOS|EdgiOS/.test(ua);
    }

    // Check if sensors are available at all
    function checkSensorAvailable() {
      return 'DeviceMotionEvent' in window || 'DeviceOrientationEvent' in window;
    }

    // Screen Wake Lock: prevent the phone from dimming/locking while playing
    let _wakeLock = null;
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          _wakeLock = await navigator.wakeLock.request('screen');
          _wakeLock.addEventListener('release', () => { _wakeLock = null; });
          // If the page becomes visible again after being hidden, re-acquire
          document.addEventListener('visibilitychange', async () => {
            if (_wakeLock === null && document.visibilityState === 'visible') {
              try {
                _wakeLock = await navigator.wakeLock.request('screen');
              } catch (_) {}
            }
          });
          return true;
        }
      } catch (e) {
        console.error('Wake lock error:', e);
      }
      return false;
    }

    async function releaseWakeLock() {
      try {
        if (_wakeLock !== null) {
          await _wakeLock.release();
          _wakeLock = null;
        }
      } catch (_) {}
    }

    // Background music — synthesized via Web Audio API so no audio file is
    // shipped in the bundle. A bouncy C-major loop designed to feel playful
    // for young kids. Browsers block AudioContext from producing sound
    // until there's a user gesture, so if the context starts 'suspended'
    // we attach one-time document listeners to resume it on first tap/key.
    let _musicCtx = null;
    let _musicGain = null;
    let _musicTimer = null;
    let _musicLoopRunning = false;
    let _musicWaitingForGesture = false;

    function _musicMelody() {
      return [
        [523, 0.18], [659, 0.18], [784, 0.18], [659, 0.18],
        [523, 0.18], [659, 0.18], [784, 0.36],
        [698, 0.18], [784, 0.18], [880, 0.36],
        [784, 0.18], [659, 0.18], [523, 0.36],
        [0, 0.3]
      ];
    }
    function _musicBass() {
      return [
        [131, 0.72], [131, 0.72], [174, 0.72], [131, 0.72], [0, 0.3]
      ];
    }
    function _musicPlayNote(time, freq, dur, type, targetGain) {
      if (freq <= 0 || !_musicCtx) return;
      const osc = _musicCtx.createOscillator();
      const g = _musicCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0, time);
      g.gain.linearRampToValueAtTime(targetGain, time + 0.02);
      g.gain.linearRampToValueAtTime(0, time + dur * 0.95);
      osc.connect(g);
      g.connect(_musicGain);
      osc.start(time);
      osc.stop(time + dur);
    }
    function _musicLoop() {
      if (!_musicCtx || !_musicLoopRunning) return;
      let t = _musicCtx.currentTime + 0.05;
      const phraseStart = t;
      for (const [f, d] of _musicMelody()) {
        _musicPlayNote(t, f, d, 'triangle', 1.0);
        t += d;
      }
      let b = phraseStart;
      for (const [f, d] of _musicBass()) {
        _musicPlayNote(b, f, d, 'sine', 0.8);
        b += d;
      }
      const aheadMs = Math.max(0, (t - _musicCtx.currentTime) * 1000 - 50);
      _musicTimer = setTimeout(_musicLoop, aheadMs);
    }
    function _musicArmAndLoop() {
      if (!_musicCtx) return;
      _musicLoopRunning = true;
      _musicLoop();
    }
    function _musicWaitForGesture() {
      if (_musicWaitingForGesture) return;
      _musicWaitingForGesture = true;
      const resume = () => {
        document.removeEventListener('pointerdown', resume, true);
        document.removeEventListener('touchstart', resume, true);
        document.removeEventListener('keydown', resume, true);
        document.removeEventListener('click', resume, true);
        _musicWaitingForGesture = false;
        if (_musicCtx && _musicCtx.state === 'suspended') {
          _musicCtx.resume().then(_musicArmAndLoop).catch(console.error);
        } else {
          _musicArmAndLoop();
        }
      };
      document.addEventListener('pointerdown', resume, true);
      document.addEventListener('touchstart', resume, true);
      document.addEventListener('keydown', resume, true);
      document.addEventListener('click', resume, true);
    }

    function startBackgroundMusic() {
      if (_musicLoopRunning) return;
      try {
        if (!_musicCtx) {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtx) return;
          _musicCtx = new AudioCtx();
          _musicGain = _musicCtx.createGain();
          _musicGain.gain.value = 0.12;
          _musicGain.connect(_musicCtx.destination);
        }
        if (_musicCtx.state === 'suspended') {
          // Try to resume immediately — succeeds if we're already inside
          // a user gesture. Otherwise arm a listener for the next tap.
          _musicCtx.resume().then(() => {
            if (_musicCtx && _musicCtx.state === 'running') {
              _musicArmAndLoop();
            } else {
              _musicWaitForGesture();
            }
          }).catch(() => _musicWaitForGesture());
        } else {
          _musicArmAndLoop();
        }
      } catch (e) {
        console.error('Music error:', e);
      }
    }
    function stopBackgroundMusic() {
      _musicLoopRunning = false;
      if (_musicTimer) { clearTimeout(_musicTimer); _musicTimer = null; }
      if (_musicCtx) {
        try { _musicCtx.close(); } catch (_) {}
        _musicCtx = null;
        _musicGain = null;
      }
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
