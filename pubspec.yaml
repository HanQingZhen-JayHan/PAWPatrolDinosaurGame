name: pup_dash
description: "Pup Dash - multiplayer endless runner with phone-as-controller"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flame: ^1.21.0
  flame_audio: ^2.10.0
  firebase_core: ^3.8.0
  firebase_database: ^11.2.0
  qr_flutter: ^4.1.0
  provider: ^6.1.0
  uuid: ^4.0.0
  sensors_plus: ^5.0.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/characters/
    - assets/images/obstacles/
    - assets/images/backgrounds/
    - assets/images/ui/
    - assets/audio/
